name: Install and Launch iOS App

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  IPA_PATH: NRL-QA.ipa
  BUNDLE_ID: com.pulselive.ent.nrl

jobs:
  install-and-launch:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify IPA exists
        run: |
          if [ ! -f "$IPA_PATH" ]; then
            echo "Missing $IPA_PATH. Commit the IPA (use Git LFS) or set IPA_PATH."
            exit 1
          fi
          ls -lh "$IPA_PATH"

      - name: Boot iOS Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes available -j \
            | python3 -c "import json,sys; rs=[r for r in json.load(sys.stdin)['runtimes'] if r['isAvailable'] and r['name'].startswith('iOS')]; print(sorted(rs,key=lambda r: r['version'], reverse=True)[0]['identifier'])")
          export RUNTIME
          DEVICE=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys,os; rid=os.environ['RUNTIME']; ds=[d for d in json.load(sys.stdin)['devices'][rid] if d['isAvailable'] and 'iPhone' in d['name']]; print(sorted(ds,key=lambda d: d['name'])[0]['udid'])")
          echo "Using runtime $RUNTIME and device $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b
          echo "SIMULATOR_UDID=$DEVICE" >> "$GITHUB_ENV"

      - name: Extract IPA
        run: unzip -q "$IPA_PATH" -d extracted

      - name: Install app on simulator
        run: xcrun simctl install booted extracted/Payload/NRL-QA.app

      - name: Launch app
        id: launch
        run: |
          PID=$(xcrun simctl launch booted "$BUNDLE_ID")
          echo "Launched with PID: $PID"
          echo "pid=$PID" >> "$GITHUB_OUTPUT"
          sleep 15

      - name: Confirm app is running
        run: |
          xcrun simctl spawn booted launchctl list | grep -F "$BUNDLE_ID" || \
            pgrep -lf "$BUNDLE_ID" || \
            (echo "App process not found after launch." && exit 1)

      - name: Capture simulator screenshot
        if: always()
        run: xcrun simctl io booted screenshot screenshot.png

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshot
          path: screenshot.png
          if-no-files-found: ignore
